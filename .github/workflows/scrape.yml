name: Electricity Scraper

on:
  schedule:
    # 每天 UTC 16:00 和 22:00（北京时间 0:00 和 6:00）
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Chromium
        run: bunx playwright install chromium

      - name: Run scraper
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          SMS_RELAY_URL: ${{ secrets.SMS_RELAY_URL }}
          SMS_RELAY_TOKEN: ${{ secrets.SMS_RELAY_TOKEN }}
        run: bun run src/run-once.ts
